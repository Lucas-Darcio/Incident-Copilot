services:
  # ---------- Grupo "ambiente alvo" ----------
  app-fake:
    build: ./app-fake
    container_name: app-fake
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - copilot-net

  # ---------- Grupo "observabilidade" ----------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    depends_on:
      - app-fake
    networks:
      - copilot-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - copilot-net

  # ---------- Grupo "RAG" (Fase 3) ----------
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: qdrant
    ports:
      - "6333:6333"   # API HTTP/REST
      - "6334:6334"   # API gRPC (não usamos ainda, mas a imagem expõe)
    volumes:
      - qdrant-data:/qdrant/storage   # persiste os embeddings entre restarts
    networks:
      - copilot-net

  rag-service:
    build: ./rag-service
    container_name: rag-service
    ports:
      - "8002:8002"
    volumes:
      - ./runbooks:/app/runbooks:ro
    depends_on:
      - qdrant
    networks:
      - copilot-net

  # ---------- Agentes (Fase 4) ----------
  agent-orchestrator:
    build: ./agent-orchestrator
    container_name: agent-orchestrator
    ports:
      - "8001:8001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - rag-service
    networks:
      - copilot-net

networks:
  copilot-net:
    driver: bridge

volumes:
  qdrant-data:
